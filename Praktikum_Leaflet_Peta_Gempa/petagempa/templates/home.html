            justify-content: center;
            overflow: hidden;

            border-radius: 0 0 18px 18px;
        }

        .bmkg-banner::before {
            content: "";
            position: absolute;
            left: -90px;
            top: -160px;
            width: 470px;
            height: 470px;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0.95;
        }

        .bmkg-logo {

            top: 22px;
            left: 32px;
            z-index: 2;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #111827;
        }

        .bmkg-circle {
            width: 55px;
            height: 55px;
            margin: 0 auto 4px auto;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            background: linear-gradient(
                to bottom,
                #2563eb 0%,
                #2563eb 18%,
                #ffffff 18%,
                #ffffff 28%,
                #2563eb 28%,
                #2563eb 38%,
                #ffffff 38%,
                #ffffff 48%,
                #22c55e 48%,
                #22c55e 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-content h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1f2937;
        }

        .hero-content .source {

            font-size: 16px;
            color: #4b5563;
        }

        .pulse-icon {
            margin: 28px auto 0 auto;
            width: 180px;
            height: 70px;
        }

        .pulse-icon svg {
            width: 100%;
            height: 100%;
        }

        .section-title {
            margin: 0 0 16px 0;
            text-align: center;
            font-size: 30px;
            font-weight: 600;
            color: #111827;
        }

        .title-line {
            width: 90px;
            height: 4px;
            margin: 0 auto 22px auto;
            border-radius: 10px;
            background-color: #2563eb;
        }

        #map {
            width: 100%;
            height: 520px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
    </style>
